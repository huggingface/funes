name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  lint-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pin nightly so rustfmt rules don't drift between CI and contributor machines.
      # Bump together with the nightly used for `cargo +nightly fmt` locally.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-22
          components: rustfmt

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Faster, lower-memory linker — keeps the heavy lance/onnxruntime link in budget.
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      # lance-encoding (via lancedb) compiles protobuf in its build script.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Format check
        run: cargo +nightly-2026-04-22 fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --profile ci -- -D warnings

      # Unit tests only here — hermetic, no network. The integration test that runs the
      # real embedder lives in its own job below.
      - name: Unit tests
        run: cargo test --lib --profile ci

  integration-test:
    name: Integration Test (real embedder)
    runs-on: ubuntu-latest
    needs: lint-test
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # Cache the embedder/reranker weights so we don't re-download ~hundreds of MB from
      # the Hugging Face Hub every run. fastembed downloads into ./.fastembed_cache.
      - name: Cache fastembed models
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .fastembed_cache
          key: fastembed-models-v1

      - name: Integration test
        run: cargo test --profile ci --test index_recall -- --nocapture

      # Gated: runs only when the secret is present (skips on forks / missing secret).
      - name: Remote recall test
        env:
          HF_FUNES_TEST_TOKEN: ${{ secrets.HF_FUNES_TEST_TOKEN }}
        run: cargo test --profile ci --test remote_recall -- --nocapture
