name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  lint-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pin nightly so rustfmt rules don't drift between CI and contributor machines.
      # Bump together with the nightly used for `cargo +nightly fmt` locally.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-22
          components: rustfmt

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # One cache shared by both CI jobs (same deps under the ci profile) — fewer,
          # smaller caches that survive GitHub's 10 GB/repo limit instead of evicting.
          shared-key: ci

      # Faster, lower-memory linker — keeps the heavy lance/onnxruntime link in budget.
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      # lance-encoding (via lancedb) compiles protobuf in its build script.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Format check
        run: cargo +nightly-2026-04-22 fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --profile ci -- -D warnings

      # Unit tests only here — hermetic, no network. The integration test that runs the
      # real embedder lives in its own job below.
      - name: Unit tests
        run: cargo test --lib --profile ci

  integration-test:
    name: Integration Test (real embedder)
    runs-on: ubuntu-latest
    needs: lint-test
    timeout-minutes: 45
    env:
      # The sync round-trip test awaits one large combined future (embed + Xet upload + lance);
      # it overflows the default ~2 MB test-thread stack under the CI toolchain. Give it headroom.
      RUST_MIN_STACK: "16777216"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci

      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # sync's pre-publish secret gate shells out to trufflehog (fail-closed), so the
      # round-trip test below needs the binary on PATH. Pinned to the version used locally.
      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin v3.95.5
          trufflehog --version

      # Embedder/reranker weights (~hundreds of MB). Cache on main only — PRs restore
      # main's copy, so there's no duplicate per-PR copy eating the 10 GB cache budget.
      - name: Restore fastembed models
        id: fastembed
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .fastembed_cache
          key: fastembed-models-v1

      - name: Integration test
        run: cargo test --profile ci --test index_recall -- --nocapture

      # Gated: runs only when the secret is present (skips on forks / missing secret).
      - name: Remote recall test
        env:
          HF_FUNES_TEST_TOKEN: ${{ secrets.HF_FUNES_TEST_TOKEN }}
        run: cargo test --profile ci --test remote_recall -- --nocapture

      # Gated: create→append→recall→clear against a unique scratch path. Skips without the
      # secret; cleans up the scratch path itself.
      - name: Sync round-trip test
        env:
          HF_FUNES_TEST_TOKEN: ${{ secrets.HF_FUNES_TEST_TOKEN }}
        run: cargo test --profile ci --test sync_round_trip -- --nocapture

      - name: Save fastembed models
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && steps.fastembed.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .fastembed_cache
          key: fastembed-models-v1
