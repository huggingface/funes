name: Release

on:
  # main/PR builds validate with the fast `release` profile (and seed its cache for PRs to
  # restore); the optimized `dist` profile (fat LTO) runs only for published builds — see PROFILE.
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/install.sh"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (leave 'auto' to detect from commit messages)"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

# On pull requests the build jobs run (to validate the release build) but compute/publish
# don't; cancel superseded PR runs. Tag/dispatch runs key on run_id, so they never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  # Dispatch-only: work out the release version (strip +dev, then bump). Nothing is written or
  # pushed here — the version is stamped into each build's working tree, and only the tag and the
  # dev-bump branch are pushed by `publish` after the builds succeed, so a failed build never tags a
  # release or pushes a bump branch.
  compute:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.new }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # history + tags for `git describe`

      - name: Detect bump type from commits
        id: detect
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="HEAD"
          [ -n "$LAST_TAG" ] && RANGE="${LAST_TAG}..HEAD"
          COMMITS=$(git log --pretty=format:"%s" "$RANGE")
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^(fix|perf)(\(.*\))?:"; then
            BUMP="patch"
          fi
          echo "detected=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Resolve bump type
        id: bump
        run: |
          BUMP="${{ inputs.bump }}"
          [ "$BUMP" = "auto" ] && BUMP="${{ steps.detect.outputs.detected }}"
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          BASE="${CURRENT%%+*}" # drop any +dev build-metadata before bumping
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: [compute]
    if: |
      !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') || needs.compute.result == 'success'
        || github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    # glibc compatibility is one-way: a binary runs on any glibc >= the one it was built against.
    # Building inside 22.04 pins the floor at glibc 2.35 — on the 24.04 runner image, C deps
    # compiled during the build would bind __isoc23_*@GLIBC_2.38 symbols. A check below enforces
    # the floor on every build.
    container: ubuntu:22.04
    timeout-minutes: 90
    # Published builds (a dispatch release or a tag push) get the optimized `dist` profile; PR/main
    # validation builds use the fast `release` profile. Dispatch is the primary release path — it
    # builds before `publish` creates the tag — so gating on tags alone would ship unoptimized.
    env:
      PROFILE: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && 'dist' || 'release' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            objdump: objdump
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            features: --features vendored-openssl
            objdump: aarch64-linux-gnu-objdump
    steps:
      # Everything the bare container lacks: compilers and binutils, git for checkout/rust-cache,
      # perl for the version stamp, curl/ca-certificates for the toolchain installs, wget for
      # setup-mold, pkg-config + libssl-dev for the native x86_64 TLS link, cmake for zstd-sys,
      # unzip for bootstrap-protoc, zstd for rust-cache compression.
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential git perl curl ca-certificates pkg-config libssl-dev cmake unzip wget zstd

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Keyed by profile: fat-LTO deps have different fingerprints than the fast profile's, so a
          # shared key would make each profile's build restore the other's artifacts and recompile.
          # The container tag is in the key because cargo fingerprints don't see the build image: a
          # cache from another image would restore C objects bound to its newer glibc symbols.
          key: release-ubuntu22.04-${{ matrix.target }}-${{ env.PROFILE }}

      # Faster, lower-memory linker — keeps the heavy lance link in budget. The action runs as
      # root inside the container (no sudo) and downloads with wget, installed above.
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      # 22.04's packaged protoc is too old for the lance protos; bootstrap the pinned one.
      - name: Install protoc
        run: |
          ./scripts/bootstrap-protoc.sh
          echo "PROTOC=$PWD/.tools/protoc/bin/protoc" >> "$GITHUB_ENV"

      # aarch64 is cross-compiled inside the same 22.04 container, so its sysroot pins the same
      # glibc 2.35 floor. gcc-aarch64-linux-gnu links the binary and (via the cc crate) builds
      # vendored OpenSSL for the target; g++-aarch64-linux-gnu brings the target libstdc++.
      # cc derives the tool names from the target triple, so installing the packages is enough.
      - name: Install aarch64 cross toolchain
        if: matrix.arch == 'aarch64'
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user
          mkdir -p ~/.cargo
          {
            echo '[target.aarch64-unknown-linux-gnu]'
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> ~/.cargo/config.toml

      # Stamp the computed version into the working tree (no commit) so the binary embeds
      # it via CARGO_PKG_VERSION. Skipped on tag/PR builds, which use Cargo.toml as-is.
      - name: Set release version
        if: needs.compute.outputs.version != ''
        run: perl -i -pe 'if (!$d && s/^version = ".*"/version = "${{ needs.compute.outputs.version }}"/) { $d = 1 }' Cargo.toml

      - name: Build
        run: cargo build --profile ${{ env.PROFILE }} --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Check binary version
        run: |
          BIN="target/${{ matrix.target }}/${{ env.PROFILE }}/funes"
          EXPECTED=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            REPORTED=$(qemu-aarch64 -L /usr/aarch64-linux-gnu "$BIN" --version)
          else
            REPORTED=$($BIN --version)
          fi
          test "$REPORTED" = "funes $EXPECTED"

      # The point of the container build: fail loudly if anything drags the floor above 22.04.
      - name: Check the glibc floor
        run: |
          BIN="target/${{ matrix.target }}/${{ env.PROFILE }}/funes"
          MAX=$(${{ matrix.objdump }} -T "$BIN" | grep -o 'GLIBC_[0-9.]*' | sort -V | tail -1)
          echo "max glibc symbol version: $MAX"
          if [ "$(printf '%s\n' "${MAX#GLIBC_}" 2.35 | sort -V | tail -1)" != "2.35" ]; then
            echo "::error::binary requires $MAX, above the glibc 2.35 floor (Ubuntu 22.04)"
            exit 1
          fi

      - name: Package
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/${{ env.PROFILE }}/funes" "dist/funes-${{ matrix.arch }}-linux"
          chmod +x dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-${{ matrix.arch }}
          path: dist/

  build-macos:
    name: Build macOS (arm64)
    needs: [compute]
    if: |
      !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') || needs.compute.result == 'success'
        || github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
    runs-on: macos-14
    timeout-minutes: 60
    # See build-linux: the optimized `dist` profile for published builds, fast `release` otherwise.
    env:
      PROFILE: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && 'dist' || 'release' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-aarch64-apple-darwin-${{ env.PROFILE }}

      - name: Install protoc
        run: brew install protobuf

      - name: Set release version
        if: needs.compute.outputs.version != ''
        run: perl -i -pe 'if (!$d && s/^version = ".*"/version = "${{ needs.compute.outputs.version }}"/) { $d = 1 }' Cargo.toml

      - name: Build
        run: cargo build --profile ${{ env.PROFILE }} --target aarch64-apple-darwin

      - name: Check binary version
        run: |
          EXPECTED=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          REPORTED=$(target/aarch64-apple-darwin/${{ env.PROFILE }}/funes --version)
          test "$REPORTED" = "funes $EXPECTED"

      - name: Package
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/${{ env.PROFILE }}/funes dist/funes-arm64-apple-darwin
          chmod +x dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-arm64
          path: dist/

  # Runs only after both builds succeed. The release itself — tag + GitHub Release with the binaries
  # — never touches main, so branch protection doesn't apply. The only change to main, advancing the
  # `+dev` version marker, is pushed as a branch; the org blocks Actions from opening PRs, so a
  # maintainer opens that PR (one click from the run summary) and merges it.
  publish:
    name: Publish Release
    needs: [compute, build-linux, build-macos]
    if: |
      !cancelled() &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/') || needs.compute.result == 'success')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write # push the tag, create the release, push the dev-bump branch
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: "{linux-*,macos-*}"
          merge-multiple: true

      - name: Validate release metadata and generate checksums
        run: |
          TAG="${{ needs.compute.outputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::release tag must have the form vMAJOR.MINOR.PATCH: $TAG"
            exit 1
          fi
          COMPUTED="${{ needs.compute.outputs.version }}"
          if [ -n "$COMPUTED" ] && [ "$VERSION" != "$COMPUTED" ]; then
            echo "::error::tag $TAG does not match computed version $COMPUTED"
            exit 1
          fi

          set -- \
            funes-x86_64-linux \
            funes-aarch64-linux \
            funes-arm64-apple-darwin
          for ASSET in "$@"; do
            test -f "artifacts/$ASSET" || {
              echo "::error::missing release asset: $ASSET"
              exit 1
            }
          done
          COUNT=$(find artifacts -maxdepth 1 -type f -name 'funes-*' | wc -l | tr -d ' ')
          if [ "$COUNT" -ne "$#" ]; then
            echo "::error::expected $# release assets, found $COUNT"
            exit 1
          fi

          printf '%s\n' "$VERSION" > artifacts/VERSION
          (
            cd artifacts
            sha256sum "$@" > SHA256SUMS
          )

      # Tag the released commit and publish the binaries and their checksums. On dispatch we create
      # and push the tag at the current main commit; on a tag push, the tag already exists.
      - name: Tag and publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.compute.outputs.tag || github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" artifacts/* \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes

      # Publish the tagged release before advancing the root VERSION pointer. Root binaries remain
      # available for clients released before tagged checksum verification was introduced.
      - name: Publish binaries and installer to the Hugging Face bucket
        env:
          HF_TOKEN: ${{ secrets.HF_FUNES_RELEASE_TOKEN }}
        run: |
          TAG="${{ needs.compute.outputs.tag || github.ref_name }}"
          python3 -m venv "$RUNNER_TEMP/hfvenv"
          "$RUNNER_TEMP/hfvenv/bin/pip" install -q -U "huggingface_hub>=1.21"
          HF="$RUNNER_TEMP/hfvenv/bin/hf"
          ROOT="hf://buckets/huggingface/funes"

          "$HF" buckets sync ./artifacts "$ROOT/$TAG" --ignore-existing
          for ASSET in funes-x86_64-linux funes-aarch64-linux funes-arm64-apple-darwin; do
            "$HF" buckets cp "./artifacts/$ASSET" "$ROOT/$ASSET"
          done
          "$HF" buckets cp ./artifacts/VERSION "$ROOT/VERSION"
          "$HF" buckets cp scripts/install.sh "$ROOT/install.sh"

      # Dispatch only: push a branch advancing main's version marker to `<version>+dev`. The org
      # blocks Actions from opening PRs, so the workflow stops at the branch and surfaces a one-click
      # "create PR" link in the run summary; a maintainer opens that PR and merges it.
      - name: Push the dev-bump branch
        if: needs.compute.outputs.version != ''
        run: |
          DEV="${{ needs.compute.outputs.version }}+dev"
          BRANCH="chore/bump-dev-${{ needs.compute.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          perl -i -pe 'if (!$d && s/^version = ".*"/version = "'"$DEV"'"/) { $d = 1 }' Cargo.toml
          perl -i -pe 'if ($h) { s/^version = .*/version = "'"$DEV"'"/; $h = 0 } $h = 1 if /^name = "funes"$/' Cargo.lock
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to $DEV"
          git push --force origin "$BRANCH"
          URL="${{ github.server_url }}/${{ github.repository }}/compare/main...${BRANCH}?expand=1"
          {
            echo "### Version bump ready"
            echo ""
            echo "Advance \`main\` to \`$DEV\`: open the PR from \`$BRANCH\`, then merge it."
            echo ""
            echo "[Create pull request →]($URL)"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Open the version-bump PR: $URL"
